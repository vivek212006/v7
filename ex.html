<!DOCTYPE html>
<html>
<head>
  <title>Simple Registration Form</title>
  <style>
 body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }
 container {
      width: 300px;
      margin: 100px auto;
      padding: 25px;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 0 10px gray;
    }
 input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 8px;
      margin: 6px 0 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
 input[type="submit"] {
      width: 100%;
      background-color: #4CAF50;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
